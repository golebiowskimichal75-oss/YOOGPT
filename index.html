<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOOGPT - Twoja Inteligentna AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f7f8;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
        }

        #main-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #header {
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid #e5e5e5;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #333;
        }

        #chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: scroll;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #5c6bc0;
            color: white;
            align-self: flex-end;
        }

        .ai-message {
            background-color: white;
            color: #333;
            align-self: flex-start;
            border: 1px solid #e5e5e5;
        }

        #input-area {
            display: flex;
            padding: 20px;
            background-color: white;
            border-top: 1px solid #e5e5e5;
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }

        input {
            flex-grow: 1;
            padding: 12px 20px;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #5c6bc0;
        }

    </style>
</head>
<body>

    <div id="main-container">
        <div id="header">
            <h1>YOOGPT</h1>
            <p style="color: #777;">CHATGPT ale lepszy i tak jak u Gemini!</p>
        </div>

        <div id="chat-container">
            </div>

        <div id="input-area">
            <input type="text" id="userInput" placeholder="Zadaj pytanie do YOOGPT...">
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-container');

        // To jest nasza lokalna "pamięć" AI w przeglądarce
        const pamiec = {
            "wrocław": "Miasto z krasnalami, bardzo fajne!",
            "lubisz psy": "Jasne! Są super.",
            "kto cię stworzył": "Michał Golebiowski na GitHubie!"
        };

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isUser ? 'user-message' : 'ai-message');
            msgDiv.innerHTML = isUser ? `<b>Ty:</b> ${text}` : `<b>YOOGPT:</b> ${text}`;
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight; // Automatyczne przewijanie na dół
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const userText = input.value.trim();
                addMessage(userText, true); // Dodaj wiadomość użytkownika
                input.value = ''; // Wyczyść pole wpisywania

                // AI "myśli" przez sekundę
                setTimeout(() => {
                    let response;
                    const lowercaseText = userText.toLowerCase();

                    if (pamiec[lowercaseText]) {
                        response = pamiec[lowercaseText];
                    } else if (lowercaseText.includes("hej") || lowercaseText.includes("cześć")) {
                        response = "Cześć! O czym chciałbyś porozmawiać?";
                    } else if (lowercaseText.includes("uczyć się")) {
                        response = "Oczywiście! Cały czas uczę się nowych rzeczy w zakładce GitHub Actions!";
                    }
                    else {
                        response = "Interesujące... Zapamiętam to i spróbuję wykorzystać w moim kodzie Pythona na GitHubie!";
                    }
                    addMessage(response, false); // Dodaj odpowiedź AI
                }, 800);
            }
        });

    </script>
</body>
</html>
