<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOOGPT - Wersja Stabilna</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1b; color: white; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; }
        
        /* Styl nagłówka na górze */
        #header {
            width: 100%;
            padding: 30px 0;
            text-align: center;
            border-bottom: 1px solid #333;
            background-color: #1a1a1b;
        }
        #header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; }
        #header p { margin: 5px 0 0; color: #888; font-size: 1.1rem; }

        #main-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; height: 100%; }
        #chat-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .message { padding: 12px 16px; border-radius: 20px; max-width: 85%; line-height: 1.4; }
        .user-message { background-color: #2b5278; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-message { background-color: #2f2f2f; align-self: flex-start; border: 1px solid #444; border-bottom-left-radius: 4px; }
        
        #input-area { padding: 20px; display: flex; background: #1a1a1b; border-top: 1px solid #333; }
        input { width: 100%; padding: 15px 25px; border-radius: 30px; border: 1px solid #444; background: #2f2f2f; color: white; outline: none; font-size: 16px; }
        input:focus { border-color: #5c6bc0; }
    </style>
</head>
<body>
    <div id="main-container">
        <div id="header">
            <h1>YOOGPT</h1>
            <p>CHATGPT ale lepszy!!!</p>
        </div>

        <div id="chat-container">
            <div class="message ai-message"><b>YOOGPT:</b> Cześć Michał! System naprawiony i nagłówki dodane. Spróbuj mnie teraz nauczyć kilku rzeczy naraz.</div>
        </div>
        
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Ucz mnie: pytanie = odpowiedź...">
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-container');
        let bazaWiedzy = JSON.parse(localStorage.getItem('yoogpt_brain')) || {};

        function normalizuj(t) {
            if (!t) return "";
            return t.toLowerCase().trim()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/[?.,!]/g, "")
                .replace(/\s+/g, " ");
        }

        function addMessage(t, isUser) {
            const m = document.createElement('div');
            m.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            m.innerHTML = `<b>${isUser ? 'Ty' : 'YOOGPT'}:</b> ${t}`;
            chat.appendChild(m);
            chat.scrollTop = chat.scrollHeight;
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const raw = input.value.trim();
                addMessage(raw, true);
                input.value = '';

                setTimeout(() => {
                    let response = "";
                    const nRaw = normalizuj(raw);

                    if (nRaw.startsWith("ucz sie")) {
                        const tresc = raw.includes(":") ? raw.substring(raw.indexOf(":") + 1) : raw.substring(7);
                        const lekcje = tresc.split(";");
                        let licznik = 0;

                        lekcje.forEach(l => {
                            if (l.includes("=")) {
                                const czesci = l.split("=");
                                const p = normalizuj(czesci[0]);
                                const o = czesci[1] ? czesci[1].trim() : "";
                                if (p && o) {
                                    bazaWiedzy[p] = o;
                                    licznik++;
                                }
                            }
                        });
                        
                        localStorage.setItem('yoogpt_brain', JSON.stringify(bazaWiedzy));
                        response = `Zrozumiałem! Nauczyłem się ${licznik} nowych rzeczy. Przetestuj mnie!`;
                    } 
                    else {
                        const klucz = normalizuj(raw);
                        response = bazaWiedzy[klucz] || "Nie znam jeszcze odpowiedzi. Naucz mnie: <b>ucz się: pytanie = odpowiedź</b>";
                    }
                    addMessage(response, false);
                }, 400);
            }
        });
    </script>
</body>
</html>
