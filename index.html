<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOOGPT - Masowe Uczenie</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1b;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        #main-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        #chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 80%;
            line-height: 1.5;
        }

        .user-message { background-color: #2b5278; align-self: flex-end; }
        .ai-message { background-color: #2f2f2f; align-self: flex-start; border: 1px solid #444; }

        #input-area {
            padding: 20px;
            background-color: #1a1a1b;
            display: flex;
            justify-content: center;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #444;
            border-radius: 30px;
            background-color: #2f2f2f;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .system-info { font-size: 0.8rem; color: #888; text-align: center; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="header">
            <h1>YOOGPT</h1>
            <p class="system-info">Teraz możesz uczyć mnie wielu rzeczy naraz (użyj ; )</p>
        </div>

        <div id="chat-container">
            <div class="message ai-message">
                <b>YOOGPT:</b> Możesz uczyć mnie wielu rzeczy naraz!<br>
                Przykład: <b>ucz się: cześć = hej; 1+1 = 2; pies = szczeka</b>
            </div>
        </div>

        <div id="input-area">
            <input type="text" id="userInput" placeholder="Wpisz wiele komend oddzielonych średnikiem...">
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-container');

        let bazaWiedzy = JSON.parse(localStorage.getItem('yoogpt_brain')) || {};

        function saveMemory() {
            localStorage.setItem('yoogpt_brain', JSON.stringify(bazaWiedzy));
        }

        function normalizuj(tekst) {
            if (!tekst) return "";
            return tekst
                .toLowerCase()
                .trim()
                .replace(/[?.,!]/g, "")
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/\s+/g, " ");
        }

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isUser ? 'user-message' : 'ai-message');
            msgDiv.innerHTML = isUser ? `<b>Ty:</b> ${text}` : `<b>YOOGPT:</b> ${text}`;
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const rawText = input.value.trim();
                const textLower = rawText.toLowerCase();
                
                addMessage(rawText, true);
                input.value = '';

                setTimeout(() => {
                    let response;

                    // --- NOWA LOGIKA: MASOWE UCZENIE ---
                    if (textLower.startsWith("ucz sie:")) {
                        const wszystkoPoDwukropku = rawText.substring(rawText.indexOf(":") + 1);
                        const lekcje = wszystkoPoDwukropku.split(";"); // Dzielimy po średniku
                        
                        let licznik = 0;
                        lekcje.forEach(lekcja => {
                            const czesci = lekcja.split("=");
                            if (czesci.length === 2) {
                                const q = normalizuj(czesci[0]);
                                const a = czesci[1].trim();
                                if (q && a) {
                                    bazaWiedzy[q] = a;
                                    licznik++;
                                }
                            }
                        });

                        if (licznik > 0) {
                            saveMemory();
                            response = `Zakończyłem naukę! Zapamiętałem nowe informacje (${licznik}).`;
                        } else {
                            response = "Nie zrozumiałem formuły. Użyj: ucz się: pytanie1 = odp1; pytanie2 = odp2";
                        }
                    } 
                    else if (bazaWiedzy[normalizuj(rawText)]) {
                        response = bazaWiedzy[normalizuj(rawText)];
                    } 
                    else if (normalizuj(rawText) === "wyczysc pamiec") {
                        bazaWiedzy = {};
                        localStorage.removeItem('yoogpt_brain');
                        response = "Pamięć wyczyszczona.";
                    }
                    else {
                        response = "Nie znam odpowiedzi. Naucz mnie: <b>ucz się: pytanie = odpowiedź</b>";
                    }

                    addMessage(response, false);
                }, 500);
            }
        });
    </script>
</body>
</html>
