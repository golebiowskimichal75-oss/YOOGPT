<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOOGPT - Inteligentna AI z Pamięcią</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1b; /* Ciemny motyw jak w profesjonalnych AI */
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        #main-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: #1a1a1b;
        }

        #header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        #chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 80%;
            line-height: 1.5;
        }

        .user-message {
            background-color: #2b5278;
            align-self: flex-end;
        }

        .ai-message {
            background-color: #2f2f2f;
            align-self: flex-start;
            border: 1px solid #444;
        }

        #input-area {
            padding: 20px;
            background-color: #1a1a1b;
            display: flex;
            justify-content: center;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #444;
            border-radius: 30px;
            background-color: #2f2f2f;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: #4a90e2;
        }

        .system-info {
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="header">
            <h1>YOOGPT</h1>
            <p class="system-info">Moja AI uczy się na stałe!</p>
        </div>

        <div id="chat-container">
            <div class="message ai-message">
                <b>YOOGPT:</b> Cześć! Pamiętam wszystko, czego mnie nauczysz. <br>
                Użyj formuły: <b>ucz się: [pytanie] = [odpowiedź]</b>
            </div>
        </div>

        <div id="input-area">
            <input type="text" id="userInput" placeholder="Napisz coś lub naucz mnie...">
        </div>
    </div>

   <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-container');

        let bazaWiedzy = JSON.parse(localStorage.getItem('yoogpt_brain')) || {};

        function saveMemory() {
            localStorage.setItem('yoogpt_brain', JSON.stringify(bazaWiedzy));
        }

        // --- NOWA FUNKCJA: CZYSZCZENIE TEKSTU ---
        function normalizuj(tekst) {
            return tekst
                .toLowerCase()
                .trim()
                .replace(/[?.,!]/g, "") // Usuwa znaki interpunkcyjne
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Zamienia ą->a, ś->s itd.
                .replace(/\s+/g, " "); // Zamienia podwójne spacje na pojedyncze
        }

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isUser ? 'user-message' : 'ai-message');
            msgDiv.innerHTML = isUser ? `<b>Ty:</b> ${text}` : `<b>YOOGPT:</b> ${text}`;
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const rawText = input.value.trim();
                
                // Normalizujemy to, co wpisał użytkownik
                const czystyTekst = normalizuj(rawText);
                
                addMessage(rawText, true);
                input.value = '';

                setTimeout(() => {
                    let response;

                    // LOGIKA UCZENIA (tu nie normalizujemy wszystkiego, żeby zachować znaki w odpowiedzi)
                    if (czystyTekst.startsWith("ucz sie") && rawText.includes("=")) {
                        const content = rawText.split(":")[1]; 
                        const parts = content.split("=");
                        
                        if (parts.length === 2) {
                            // Pytanie zapisujemy w formie znormalizowanej (bez ogonków i pytajników)
                            const q = normalizuj(parts[0]);
                            const a = parts[1].trim();
                            bazaWiedzy[q] = a;
                            saveMemory();
                            response = `Zapamiętałem! Teraz zrozumiem pytanie "${q}" nawet z błędami i bez pytajnika.`;
                        }
                    } 
                    // SPRAWDZANIE WIEDZY (używamy znormalizowanego tekstu)
                    else if (bazaWiedzy[czystyTekst]) {
                        response = bazaWiedzy[czystyTekst];
                    } 
                    else if (czystyTekst === "wyczysc pamiec") {
                        bazaWiedzy = {};
                        localStorage.removeItem('yoogpt_brain');
                        response = "Pamięć wyczyszczona.";
                    }
                    else {
                        response = "Nie znam odpowiedzi. Naucz mnie: <b>ucz się: pytanie = odpowiedź</b>";
                    }

                    addMessage(response, false);
                }, 500);
            }
        });
    </script>
</body>
</html>
