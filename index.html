<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOOGPT | CHATGPT ale lepszy!!</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #1a1a1b; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* NAGŁÓWEK Z TWOJEGO PIERWSZEGO SCREENA */
        #top-header {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: left; /* Tak jak na Twoim screenie */
        }
        #top-header h1 { 
            font-size: 32px; 
            margin: 0; 
            font-weight: bold;
        }
        #top-header p { 
            font-size: 14px; 
            color: #ccc; 
            margin-top: 10px;
            border-top: 1px solid #333; /* Ta linia pod napisem YOOGPT */
            padding-top: 15px;
        }

        #main-container { 
            width: 100%; 
            max-width: 800px; 
            display: flex; 
            flex-direction: column; 
            flex-grow: 1;
            margin-bottom: 20px;
        }

        #chat-container { 
            flex-grow: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .message { padding: 12px 18px; border-radius: 20px; max-width: 80%; line-height: 1.5; }
        .user-message { background-color: #2b5278; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-message { background-color: #2f2f2f; align-self: flex-start; border: 1px solid #444; border-bottom-left-radius: 4px; }

        #input-area { 
            width: 100%;
            max-width: 800px;
            padding: 20px; 
            display: flex; 
            background: #1a1a1b; 
            box-sizing: border-box;
        }

        input { 
            width: 100%; 
            padding: 16px 25px; 
            border-radius: 30px; 
            border: 1px solid #444; 
            background: #2f2f2f; 
            color: white; 
            outline: none; 
            font-size: 16px; 
        }
        input:focus { border-color: #5c6bc0; }
    </style>
</head>
<body>

    <div id="top-header">
        <h1>YOOGPT</h1>
        <p>CHATGPT ale lepszy!!!</p>
    </div>

    <div id="main-container">
        <div id="chat-container">
            </div>
        
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Napisz coś lub naucz mnie (ucz się: pytanie = odpowiedź)...">
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-container');
        let bazaWiedzy = JSON.parse(localStorage.getItem('yoogpt_brain')) || {};

        function normalizuj(t) {
            if (!t) return "";
            return t.toLowerCase().trim()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/[?.,!:]/g, "")
                .replace(/\s+/g, " ");
        }

        function addMessage(t, isUser) {
            const m = document.createElement('div');
            m.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            m.innerHTML = `<b>${isUser ? 'Ty' : 'YOOGPT'}:</b> ${t}`;
            chat.appendChild(m);
            chat.scrollTop = chat.scrollHeight;
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const raw = input.value.trim();
                const nRaw = normalizuj(raw);
                addMessage(raw, true);
                input.value = '';

                setTimeout(() => {
                    let response = "";

                    // 1. UCZENIE
                    if (nRaw.startsWith("ucz sie")) {
                        const tresc = raw.includes(":") ? raw.substring(raw.indexOf(":") + 1) : raw.substring(7);
                        const lekcje = tresc.split(";");
                        let licznik = 0;
                        lekcje.forEach(l => {
                            if (l.includes("=")) {
                                const [p, o] = l.split("=");
                                const p_norm = normalizuj(p);
                                if (p_norm && o) {
                                    bazaWiedzy[p_norm] = o.trim();
                                    licznik++;
                                }
                            }
                        });
                        localStorage.setItem('yoogpt_brain', JSON.stringify(bazaWiedzy));
                        response = `Nauczyłem się ${licznik} nowych rzeczy!`;
                    } 
                    // 2. SPRAWDZANIE WIEDZY (NAUCZONE)
                    else if (bazaWiedzy[nRaw]) {
                        response = bazaWiedzy[nRaw];
                    }
                    // 3. AUTOMATYCZNA MATEMATYKA (NOWOŚĆ!)
                    else {
                        // Sprawdzamy czy tekst zawiera tylko liczby i znaki matematyczne (+, -, *, /, .)
                        const mathRegex = /^[0-9+\-*/().\s]+$/;
                        if (mathRegex.test(raw.replace(/,/g, '.'))) {
                            try {
                                // Zamieniamy przecinek na kropkę dla komputera
                                const calculation = raw.replace(/,/g, '.');
                                const result = eval(calculation);
                                response = `Obliczyłem to! Wynik to: **${result}**`;
                            } catch (err) {
                                response = "To wygląda na matematykę, ale coś jest nie tak z działaniem.";
                            }
                        } else {
                            response = "Nie znam jeszcze odpowiedzi na to pytanie. Naucz mnie!";
                        }
                    }
                    addMessage(response, false);
                }, 400);
            }
        });
    </script>
</body>
</html>
