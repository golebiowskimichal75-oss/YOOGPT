<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOOGPT - Wersja Stabilna</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1b; color: white; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; }
        #main-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; height: 100%; }
        #chat-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px; border-radius: 15px; max-width: 80%; }
        .user-message { background-color: #2b5278; align-self: flex-end; }
        .ai-message { background-color: #2f2f2f; align-self: flex-start; border: 1px solid #444; }
        #input-area { padding: 20px; display: flex; }
        input { width: 100%; padding: 15px; border-radius: 30px; border: 1px solid #444; background: #2f2f2f; color: white; outline: none; }
    </style>
</head>
<body>
    <div id="main-container">
        <div id="chat-container">
            <div class="message ai-message"><b>YOOGPT:</b> Cześć! System naprawiony. Spróbuj mnie teraz nauczyć kilku rzeczy naraz.</div>
        </div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Wklej formułę uczenia...">
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-container');
        let bazaWiedzy = JSON.parse(localStorage.getItem('yoogpt_brain')) || {};

        function normalizuj(t) {
            return t ? t.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[?.,!]/g, "") : "";
        }

        function addMessage(t, isUser) {
            const m = document.createElement('div');
            m.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            m.innerHTML = `<b>${isUser ? 'Ty' : 'YOOGPT'}:</b> ${t}`;
            chat.appendChild(m);
            chat.scrollTop = chat.scrollHeight;
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const raw = input.value.trim();
                addMessage(raw, true);
                input.value = '';

                setTimeout(() => {
                    let response = "";
                    const lowerRaw = raw.toLowerCase();

                    if (lowerRaw.startsWith("ucz sie:")) {
                        const lekcje = raw.substring(raw.indexOf(":") + 1).split(";");
                        let licznik = 0;

                        lekcje.forEach(l => {
                            if (l.includes("=")) {
                                const [p, o] = l.split("=");
                                const p_norm = normalizuj(p);
                                if (p_norm && o) {
                                    bazaWiedzy[p_norm] = o.trim();
                                    licznik++;
                                }
                            }
                        });
                        
                        localStorage.setItem('yoogpt_brain', JSON.stringify(bazaWiedzy));
                        response = `Nauczyłem się ${licznik} nowych rzeczy!`;
                    } 
                    else {
                        const zapytywany = normalizuj(raw);
                        response = bazaWiedzy[zapytywany] || "Nie znam odpowiedzi. Naucz mnie: ucz się: pytanie = odpowiedź";
                    }
                    addMessage(response, false);
                }, 300);
            }
        });
    </script>
</body>
</html>
